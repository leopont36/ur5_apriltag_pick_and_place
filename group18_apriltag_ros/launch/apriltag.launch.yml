launch:
- arg:
    name: device
    default: "0"

- node_container:
    pkg: "group18_apriltag_ros"
    plugin: AprilTagNode
    exec: "apriltag_node"
    name: apriltag
    namespace: "apriltag"

    remap:
      - from: "image_rect"
        to: "/camera/image"
      - from: "camera_info"
        to: "/camera/camera_info"

    param:
      - from: "$(find-pkg-share apriltag_ros)/cfg/tags_36h11.yaml"